<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        color: #111827;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
      }

      p {
        margin: 0 0 12px;
        color: #6b7280;
      }

      .status {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 10px 12px;
        color: #111827;
        background: #f9fafb;
      }
    </style>
  </head>
  <body>
    <h1>Codex PingFang Bridge</h1>
    <p>Keep this plugin open while Codex generates Figma designs.</p>
    <div id="status" class="status">Connecting to local server...</div>

    <script>
      const server = "http://localhost:3957";
      const statusEl = document.getElementById("status");
      const pending = new Map();

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function postResult(result) {
        await fetch(`${server}/bridge/result`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(result),
        });
      }

      async function poll() {
        while (true) {
          try {
            const response = await fetch(`${server}/bridge/next`);
            const data = await response.json();
            if (!data.job) {
              setStatus("Connected. Waiting for Codex jobs...");
              await sleep(750);
              continue;
            }

            setStatus(`Rendering job ${data.job.id.slice(0, 8)}...`);
            pending.set(data.job.id, data.job);
            parent.postMessage({ pluginMessage: data.job }, "*");
          } catch (error) {
            setStatus(`Local server unavailable: ${error.message}`);
            await sleep(1500);
          }
        }
      }

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (!message || !message.id) return;
        pending.delete(message.id);
        await postResult(message);
        setStatus(message.ok ? "Rendered. Waiting for Codex jobs..." : `Render failed: ${message.error}`);
      };

      poll();
    </script>
  </body>
</html>
