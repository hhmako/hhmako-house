<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=375,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>上门维修详情</title>
<style>
:root{--ink:#161823;--tertiary:#8a8b91;--gray:#f5f6f9;--red:#ff003c;--line:rgba(22,24,35,.08)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:811px;overflow:hidden;background:#dadde3;font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;color:var(--ink)}body{position:fixed;inset:0}
button{font:inherit}.viewport{position:relative;width:375px;height:811px;margin:0;overflow:hidden;background:var(--gray)}
.head-gradient{position:absolute;inset:0 0 auto;height:183px;background:linear-gradient(180deg,#fff 0 73%,rgba(255,255,255,0))}
.screen{position:relative;display:flex;flex-direction:column;gap:8px;width:375px}.header{display:flex;flex-direction:column;align-items:center}
.status{position:relative;width:375px;height:44px;background:#fff}.time{position:absolute;left:34.5px;top:17px;font-size:12px;font-weight:600;line-height:14px}.device{position:absolute;right:14px;top:17px;width:67px;height:12px}.device img{position:absolute;inset:0;width:67px;height:12px}.draft{position:absolute;left:50%;top:6px;transform:translateX(-50%);height:24px;padding:2px 14px;border:1px solid #fff;border-radius:31px;background:#ee440f;color:#fff;font-size:14px;font-weight:500;line-height:18px;white-space:nowrap}
.nav{position:relative;width:375px;height:44px;background:#fff}.back{position:absolute;left:16px;top:10px;width:24px;height:24px}.back img{position:absolute;left:4.72px;top:2.86px;width:9.92px;height:18.27px}.more{position:absolute;right:16px;top:10px;width:24px;height:24px}.more img{position:absolute;left:3.2px;top:10.2px;width:17.6px;height:3.6px}.steps{position:absolute;top:10px;height:24px;display:flex;align-items:center;gap:5px;font-size:12px;line-height:17px;white-space:nowrap}.steps.three{left:97px;width:181px}.steps.two{left:164px;width:114px}.steps .muted{color:#b9babd}.dash{width:10px;height:10px;position:relative;flex:none}.dash:after{content:"";position:absolute;left:2px;top:4.5px;width:6px;height:1px;background:#b9babd}
.hero{width:359px;padding:16px 12px;border-radius:0 0 16px 16px;background:#fff}.hero-inner{width:335px;display:flex;flex-direction:column;align-items:center;gap:8px}.hero h1{margin:0;font-size:32px;font-weight:600;line-height:44px;white-space:nowrap}.hero .desc{margin:0;width:335px;font-size:12px;line-height:17px}.hero .desc em{font-style:normal;color:var(--red)}.notes{width:335px;display:flex;flex-direction:column;gap:4px;color:var(--tertiary);font-size:12px;line-height:17px}.note{display:flex;gap:4px}.note:before{content:"·";width:7px;flex:none;font-size:13px;line-height:17px}
.floors{display:flex;flex-direction:column;align-items:center;gap:8px}.card{width:359px;padding:12px;border-radius:16px;background:#fff}.agreement{height:45px;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:500;line-height:21px}.right-chevron{width:4.97px;height:9.41px;margin-right:3.5px}
.repair{display:flex;flex-direction:column;gap:12px}.card-title{height:21px;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:500}.contact{display:flex;gap:2px;align-items:center;font-size:12px;font-weight:400}.contact-icon{width:11.67px;height:11.91px;margin:1px 1.16px}.product{display:flex;align-items:center;gap:8px;width:335px}.product img{width:50px;height:50px;border-radius:10px;object-fit:cover;background:#f5f6f9}.product-copy{width:277px;height:50px;display:flex;flex-direction:column;justify-content:center;gap:2px}.product-name,.product-meta{margin:0;font-size:12px;line-height:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.product-meta{color:var(--tertiary)}.kv{display:flex;flex-direction:column;gap:12px}.kv-row{display:flex;justify-content:space-between;color:var(--tertiary);font-size:12px;line-height:17px}.expand{text-align:right;color:var(--tertiary);font-size:12px;line-height:17px}.problem{display:flex;flex-direction:column;gap:12px}.problem-head{display:flex;justify-content:space-between;align-items:center}.problem-head strong{font-size:15px;line-height:21px}.more-link{font-size:12px;color:var(--tertiary)}.chips{height:34px;display:flex;gap:8px;overflow:hidden}.chip{flex:none;padding:8px 10px;border-radius:6px;background:var(--gray);color:var(--tertiary);font-size:12px;line-height:17px;white-space:nowrap}.recommend{width:359px;height:168px;display:grid;grid-template-columns:1fr 1fr;gap:6px;overflow:hidden;border-radius:12px}.recommend img{width:100%;height:100%;object-fit:cover}.bottom{position:absolute;left:0;right:0;bottom:0;height:78px;padding:10px 12px 24px;background:#fff;display:flex;justify-content:flex-end;gap:8px}.bottom button{height:36px;padding:0 14px;border:1px solid rgba(22,24,35,.2);border-radius:999px;background:#fff;color:#161823;font-size:14px;line-height:20px}.home{position:absolute;left:50%;bottom:8px;width:100px;height:5px;transform:translateX(-50%);border-radius:5px;background:#000}
.state-card{display:flex;flex-direction:column;gap:8px}.state-card h2{margin:0;font-size:15px;line-height:21px;font-weight:500}.state-card p{margin:0;color:var(--tertiary);font-size:12px;line-height:19px}.visit-card{height:131px;padding-bottom:16px}.evidence{display:flex;gap:7px;height:50px;overflow:hidden}.evidence span{position:relative;flex:none;width:50px;height:50px}.evidence img{width:50px;height:50px;border-radius:8px;object-fit:cover}.evidence .count:after{content:'+3';position:absolute;inset:0;display:grid;place-items:center;border-radius:8px;background:rgba(22,24,35,.48);color:#fff;font-size:16px}.address{display:grid;grid-template-columns:70px 1fr;gap:8px;font-size:12px;line-height:17px}.address .value{text-align:right;color:var(--tertiary)}.address-actions{display:flex;justify-content:space-around;padding-top:14px;font-size:13px;line-height:20px}.address-actions span{display:flex;align-items:center;gap:4px}.address-actions img{display:block;object-fit:contain}.address-actions img[src*="icon-edit"]{width:17.15px;height:17.41px;margin:1.3px 1.42px}.address-actions img[src*="icon-call"]{width:20px;height:20px;margin:0}.rating{position:relative;height:53px;display:flex;align-items:center;justify-content:space-between;overflow:visible;border-radius:0;background:transparent url("assets/rating-bg.svg") center/359px 53px no-repeat}.rating-title{display:flex;align-items:center;gap:4px;font-size:15px;line-height:21px;font-weight:500}.anon-tag{display:inline-flex;align-items:center;justify-content:center;width:26px;height:16px;border:.5px solid rgba(22,24,35,.15);border-radius:3px;color:#8a8b91;font-size:10px;line-height:14px;font-weight:400}.mini-chevron{width:4.97px;height:9.41px;margin-left:0}.rating .cute{position:absolute;right:7px;top:4px;width:47px;height:45px;object-fit:contain}.goods{width:359px;display:grid;grid-template-columns:1fr 1fr;gap:6px}.goods article{overflow:hidden;border-radius:12px;background:#fff}.goods img{display:block;width:176px;height:176px;object-fit:cover}.goods p{margin:5px 8px 0;font-size:13px;line-height:18px}.goods strong{display:inline-block;margin:2px 8px 8px;color:var(--red);font-size:16px}.goods small{color:var(--tertiary);font-size:11px}.state-2 .recommend,.state-3 .recommend,.state-4 .recommend{display:none}.state-2 .bottom button:first-of-type{visibility:hidden}.state-4 .bottom{justify-content:flex-end}.state-5 .bottom,.state-6 .bottom{display:none}.state-5 .hero,.state-6 .hero{margin-top:-20px}
.failure-card{gap:12px;padding:12px 12px 16px;border-radius:12px}.failure-card .failure-copy{display:flex;flex-direction:column;gap:4px}.failure-card .evidence{margin-top:0}
.reject-card{padding-bottom:16px;border-radius:12px}
.rating{padding:12px;border-radius:16px 0 0 16px;overflow:hidden;background:transparent url("assets/rating-bg@3x.png?release=repair-radius-r3") center/359px 53px no-repeat}
.rating .cute{display:none}.rating::after{content:"";position:absolute;right:0;top:0;width:55px;height:53px;background:url("assets/rating-cute@3x.png?release=repair-radius-r3") center/55px 53px no-repeat;pointer-events:none}
</style>
</head>
<body><div class="viewport" id="app"></div><script>
const states=[
{title:'等待商家处理',desc:'您已提交维修申请，商家将在 <em>23时29分内</em> 处理；如商品非人为质量问题，商家将为您提供维修服务',notes:['商家同意-支持上门维修：商家将安排师傅上门维修，师傅将提前与您联系确认上门时间','商家同意-商品由您自行处理：商家将直接为您发出换新货物'],buttons:['取消维修','修改维修']},
{title:'商家已拒绝维修',desc:'请在 <em>2天23时29分内</em> 联系商家协商，或申请平台客服介入；如果您超期未处理，本次申请将关闭',special:'reject',buttons:['平台介入','取消维修','修改维修']},
{title:'等待分配维修人员',desc:'商家已同意维修，将安排维修师傅于 <em>7月20日9:00-18:00</em> 上门，师傅会提前与您联系确认具体上门时间，请保持电话畅通',special:'address',buttons:['取消维修','修改维修']},
{title:'等待上门维修',desc:'商家已安排维修师傅于 <em>7月20日9:00-18:00</em> 上门。若未准时上门，您可联系维修师傅进行催促',special:'address2',buttons:['取消维修','修改维修']},
{title:'维修完成',desc:'商家反馈维修完成，如实际未完成维修，您可以联系商家协商或重新申请售后',special:'done',buttons:['投诉未修好']},
{title:'维修失败',desc:'商家反馈无法维修，如仍需维修，您可以联系商家协商或重新申请售后',special:'failed',buttons:[]},
{title:'维修失败',desc:'商家超时未回传维修结果，如仍需维修，您可以联系商家协商或重新申请售后',special:'timeout',buttons:[]}
];
const n=Math.max(0,Math.min(6,Number(new URLSearchParams(location.search).get('state')||0))),s=states[n];
const progress=n<=3?`<div class="steps three"><span class="${n>=2?'muted':''}">商家审核</span><i class="dash"></i><span class="${n<=1?'muted':''}">上门维修</span><i class="dash"></i><span class="muted">维修完成</span></div>`:n===4?`<div class="steps three"><span class="muted">商家审核</span><i class="dash"></i><span class="muted">上门维修</span><i class="dash"></i><span>维修完成</span></div>`:'';
const evidence=()=>`<div class="evidence">${[1,2,3,4].map((x,i)=>`<span><img src="assets/evidence-${x}.png" alt="维修凭证${i+1}"></span>`).join('')}<span><img src="assets/evidence-1.png" alt="维修凭证5"></span><span class="count"><img src="assets/evidence-6.png" alt="更多维修凭证"></span></div>`;
const proof3=(label='维修凭证')=>`<div class="evidence"><span><img src="assets/failure-proof-1.png" alt="${label}1"></span><span><img src="assets/failure-proof-2.png" alt="${label}2"></span><span><img src="assets/failure-proof-3.png" alt="${label}3"></span></div>`;
const special=()=>{if(s.special==='reject')return `<div class="card state-card reject-card"><h2>拒绝原因：拒绝-使用中质量问题</h2><p>经检测，商品故障属于人为原因，暂不支持免费维修。</p>${evidence()}</div>`;if(s.special==='address'||s.special==='address2')return `<div class="card state-card visit-card"><h2>我的维修信息</h2><div class="address"><b>上门地址</b><span class="value">杨依依 15002114592 杨浦区民府路678号抖音新江湾广场T4号楼202字节跳动小邮局</span></div><div class="address-actions"><span><img src="assets/icon-edit.svg" alt="">修改上门时间</span>${s.special==='address2'?'<span><img src="assets/icon-call.svg" alt="">联系维修师傅</span>':''}</div></div>`;if(s.special==='done')return `<div class="card state-card failure-card"><div class="failure-copy"><h2>商家已上传维修凭证</h2><p>故障部件已更换，设备已恢复正常使用。</p></div>${proof3('维修完成凭证')}</div>`;if(s.special==='failed')return `<div class="card state-card failure-card"><div class="failure-copy"><h2>维修失败原因：协商一致，将商品寄回厂家维修</h2><p>当前故障需返厂检测，已与您协商后续处理方式。</p></div>${proof3('维修失败凭证')}</div>`;return ''};
const repair=`<div class="card repair"><div class="card-title"><span>维修信息</span><span class="contact"><img class="contact-icon" src="assets/icon-contact.svg" alt="">联系商家</span></div><div class="product"><img src="assets/repair-product.png" alt="iPhone 15 Pro Max"><div class="product-copy"><p class="product-name">Apple/苹果 iPhone 15 Pro Max 新款5G手机官方...</p><p class="product-meta">原色钛金属 256GB</p></div></div><div class="kv"><div class="kv-row"><span>维修件数</span><span>1件</span></div><div class="kv-row"><span>可退金额</span><span>¥298.00</span></div><div class="kv-row"><span>维修原因</span><span>使用中质量问题</span></div></div><div class="expand">展开更多售后信息⌄</div></div>`;
const problem=`<div class="card problem"><div class="problem-head"><strong>遇到问题</strong><span class="more-link">更多 ›</span></div><div class="chips"><span class="chip">退换货运费谁承担</span><span class="chip">运费险什么时候到账</span><span class="chip">商家不愿意承担运费怎么办</span></div></div>`;
const recommend=n>=5?`<div class="goods"><article><img src="assets/raw-7.png"><p>雅诗兰黛空气唇釉浓缩哑光</p><strong>¥56 <small>券后价&nbsp; 已售200件</small></strong></article><article><img src="assets/raw-8.png"><p>雅诗兰黛空气唇釉浓缩哑光</p><strong>¥56 <small>券后价&nbsp; 已售200件</small></strong></article></div>`:`<div class="recommend"><img src="assets/raw-7.png"><img src="assets/raw-8.png"></div>`;
document.getElementById('app').className=`viewport state-${n}`;document.getElementById('app').innerHTML=`<div class="head-gradient"></div><main class="screen"><header class="header"><div class="status"><span class="time">9:41</span><span class="draft">设计中，非终稿</span><span class="device"><img src="assets/status-signal.svg"></span></div><div class="nav"><span class="back"><img src="assets/icon-back.svg"></span>${progress}<span class="more"><img src="assets/icon-more.svg"></span></div><section class="hero"><div class="hero-inner"><h1>${s.title}</h1><p class="desc">${s.desc}</p>${s.notes?`<div class="notes">${s.notes.map(x=>`<div class="note">${x}</div>`).join('')}</div>`:''}</div></section></header><section class="floors">${special()}<div class="card agreement"><span>协商记录</span><img class="right-chevron" src="assets/icon-chevron.svg"></div>${n===4?'<div class="card rating"><div class="rating-title">请对本次服务进行评价 <span class="anon-tag">匿名</span><img class="mini-chevron" src="assets/icon-chevron.svg" alt=""></div><img class="cute" src="assets/rating-cute.png" alt="评价引导"></div>':''}${repair}${problem}${recommend}</section></main><footer class="bottom">${s.buttons.map(x=>`<button>${x}</button>`).join('')}<i class="home"></i></footer>`;
history.scrollRestoration='manual';requestAnimationFrame(()=>scrollTo(0,0));setTimeout(()=>scrollTo(0,0),50);
</script></body>
</html>
