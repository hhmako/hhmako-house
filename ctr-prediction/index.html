<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTR 预测测试</title>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
    body { margin: 0; background: #f5f5f7; color: #1d1d1f; overflow: hidden; }
    .test-bar { height: 72px; display: flex; align-items: center; gap: 18px; padding: 0 22px; background: rgba(255,255,255,.92); border-bottom: 1px solid rgba(0,0,0,.08); backdrop-filter: saturate(180%) blur(20px); }
    .test-title { flex: 0 0 auto; }
    .test-title strong { display: block; font-size: 15px; letter-spacing: -.01em; }
    .test-title span { display: block; margin-top: 3px; font-size: 11px; color: #86868b; }
    .tabs { min-width: 0; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .case-tab { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 14px; border: 0; border-radius: 12px; background: transparent; color: #6e6e73; cursor: pointer; font: inherit; transition: background .18s ease, color .18s ease; }
    .case-tab:hover { background: #f2f2f4; color: #1d1d1f; }
    .case-tab.active { background: #1d1d1f; color: #fff; }
    .case-tab span { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .case-tab small { font-size: 10px; color: inherit; opacity: .64; white-space: nowrap; }
    .result-frame { display: block; width: 100%; height: calc(100vh - 72px); border: 0; background: #fff; }
    @media (max-width: 720px) {
      .test-bar { height: 64px; padding: 0 12px; gap: 10px; }
      .test-title span { display: none; }
      .result-frame { height: calc(100vh - 64px); }
      .case-tab { height: 38px; padding: 0 12px; }
    }
  </style>
</head>
<body>
  <header class="test-bar">
    <div class="test-title"><strong>CTR 预测测试</strong><span>3 个案例</span></div>
    <nav class="tabs" aria-label="预测案例">
    <button class="case-tab active" type="button" data-case-id="89b41054a471" data-src="prediction_cases/89b41054a471.html" aria-selected="true">
      <span>国补入口点击</span>
      <small>UV CTR</small>
    </button>
    <button class="case-tab" type="button" data-case-id="review-tag-pv" data-src="review_tag_predicted_result.html" aria-selected="false">
      <span>评价标签点击</span>
      <small>PV CTR</small>
    </button>
    <button class="case-tab" type="button" data-case-id="review-body-pv" data-src="review_body_predicted_result.html" aria-selected="false">
      <span>买家正文点击</span>
      <small>PV CTR</small>
    </button></nav>
  </header>
  <iframe class="result-frame" id="result-frame" title="预测结果" src="prediction_cases/89b41054a471.html"></iframe>
  <script>
    const frame = document.getElementById('result-frame');
    const tabs = [...document.querySelectorAll('.case-tab')];
    function activate(tab, updateHash = true) {
      if (!tab) return;
      tabs.forEach(item => { item.classList.toggle('active', item === tab); item.setAttribute('aria-selected', item === tab ? 'true' : 'false'); });
      frame.src = tab.dataset.src;
      if (updateHash) history.replaceState(null, '', '#' + tab.dataset.caseId);
      tab.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }
    tabs.forEach(tab => tab.addEventListener('click', () => activate(tab)));
    const requested = location.hash.slice(1);
    if (requested) activate(tabs.find(tab => tab.dataset.caseId === requested), false);
  </script>
</body>
</html>
